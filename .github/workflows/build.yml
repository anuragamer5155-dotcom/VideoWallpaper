name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PATH:$PWD/gradle-8.2/bin

      - name: Extract project
        run: tar -xzf VideoLiveWallpaperPro.tar.gz

      - name: Build APK
        run: |
          export PATH=$PATH:$PWD/gradle-8.2/bin
          cd VideoLiveWallpaperPro
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoWallpaper-APK
          path: VideoLiveWallpaperPro/app/build/outputs/apk/debug/app-debug.apk
