name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract project
        run: tar -xzf VideoLiveWallpaperPro.tar.gz

      - name: Install Gradle
        run: sudo apt-get install -y gradle

      - name: Setup Gradle Wrapper
        run: |
          cd VideoLiveWallpaperPro
          mkdir -p gradle/wrapper
          gradle wrapper --gradle-version=8.2
          chmod +x gradlew

      - name: Accept Android Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        run: |
          cd VideoLiveWallpaperPro
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoWallpaper-APK
          path: VideoLiveWallpaperPro/app/build/outputs/apk/debug/app-debug.apk
